<div
  class="empty-state"
  role="status"
  [attr.aria-label]="heading()"
>
  <svg
    class="empty-state__icon"
    width="64"
    height="64"
    viewBox="0 0 64 64"
    fill="none"
    aria-hidden="true"
  >
    @switch (icon()) {
      @case ('map') {
        <!-- Empty map icon -->
        <rect x="8" y="12" width="48" height="40" rx="4" stroke="currentColor" stroke-width="2"/>
        <path d="M22 12v40M42 12v40" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2"/>
        <path d="M8 28h48M8 40h48" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2"/>
        <circle cx="32" cy="32" r="3" fill="currentColor" opacity="0.5"/>
      }
      @case ('route') {
        <!-- Route/path icon -->
        <circle cx="16" cy="16" r="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="48" cy="48" r="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="44" cy="20" r="3" stroke="currentColor" stroke-width="2"/>
        <circle cx="24" cy="44" r="3" stroke="currentColor" stroke-width="2"/>
        <path d="M19 19l22-2M43 23l-16 18M27 46l18-1" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
      }
      @case ('pointer') {
        <!-- Selection pointer icon -->
        <path d="M20 12l2 24 6-8 10 14 4-2-10-14 8-4L20 12z" stroke="currentColor" stroke-width="2" fill="currentColor" opacity="0.2"/>
        <path d="M20 12l2 24 6-8 10 14 4-2-10-14 8-4L20 12z" stroke="currentColor" stroke-width="2" fill="none"/>
      }
    }
  </svg>
  <h3 class="empty-state__heading">{{ heading() }}</h3>
  <p class="empty-state__description">{{ description() }}</p>
</div>
