<div class="map-search">
  <div class="map-search__input-wrapper">
    <input
      #searchInput
      type="text"
      class="map-search__input"
      placeholder="Szukaj lokalizacji..."
      aria-label="Szukaj lokalizacji"
      (input)="onInput($event)"
      (keydown)="onKeydown($event)"
      (blur)="onBlur()"
    />
    @if (isLoading()) {
      <span class="map-search__spinner" aria-hidden="true"></span>
    } @else {
      <button
        type="button"
        class="map-search__search-btn"
        aria-label="Szukaj"
        (click)="triggerSearch()"
      >
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    }
  </div>

  @if (showDropdown() && results().length > 0) {
    <ul class="map-search__dropdown" role="listbox" aria-label="Wyniki wyszukiwania">
      @for (result of results(); track result.place_id) {
        <li
          class="map-search__result"
          role="option"
          [attr.aria-selected]="false"
          tabindex="0"
          (click)="selectResult(result)"
          (keydown.enter)="selectResult(result)"
        >
          <span class="map-search__result-name">{{ result.name || result.display_name.split(',')[0] }}</span>
          <span class="map-search__result-detail">{{ truncateDisplayName(result.display_name) }}</span>
        </li>
      }
    </ul>
  }
</div>
