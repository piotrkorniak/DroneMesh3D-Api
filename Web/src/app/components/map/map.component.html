<div id="map-container" #mapContainer class="map-container">
  <app-map-search (locationSelected)="flyToLocation($event)" />
  <div class="toolbar-overlay">
    <app-map-toolbar
      [isDrawing]="isDrawing()"
      [hasPolygon]="hasPolygon()"
      [isValid]="isValid()"
      [isSubmitting]="isSubmitting()"
      [validationErrors]="validationErrors()"
      (draw)="startDrawing()"
      (clear)="clearPolygon()"
      (submitArea)="submitArea()"/>
  </div>
</div>
